name: RBAC Security Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Static RBAC Coverage Check
        run: npm run audit:rbac --if-present

      - name: API Contract Guard (P0)
        run: npm run test:api-rbac --if-present
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          
      - name: Playwright RBAC Scenarios
        run: npx playwright test --grep @rbac
        env:
          TEST_OWNER_EMAIL: ${{ secrets.TEST_OWNER_EMAIL }}
          TEST_OWNER_PASSWORD: ${{ secrets.TEST_OWNER_PASSWORD }}
