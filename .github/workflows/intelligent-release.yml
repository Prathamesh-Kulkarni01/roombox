name: Intelligent Release & Deployment

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  validate:
    name: 🛡️ Validate & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for semantic analysis

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Set up Java for Firebase Emulator
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Start Firebase Emulator
        run: |
          npx firebase emulators:start --only firestore &
          sleep 15

      - name: Check System Integrity
        run: npm run verify-logic
        env:
          FIRESTORE_EMULATOR_HOST: "127.0.0.1:8080"
          FIREBASE_PROJECT_ID: "roombox-test"

      - name: Dry-Run Production Migration (Safety Check)
        if: github.event_name == 'pull_request'
        run: npm run migrate --dry-run
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_PROJECT_ID: "roombox-f7bff"

  release-management:
    name: 📊 Semantic Release Management
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Intelligent Release Manager
        run: npx ts-node --project scripts/tsconfig.json -r tsconfig-paths/register scripts/ci/release-manager.ts
        env:
          NODE_ENV: production

      - name: Commit & Tag Version
        run: |
          git config --global user.name "Intelligent CI Bot"
          git config --global user.email "ci-bot@rentsutra.com"
          git add package.json CHANGELOG.md
          if ! git diff --cached --quiet; then
            NEW_VERSION=$(node -p "require('./package.json').version")
            git commit -m "chore(release): $NEW_VERSION [skip ci]" 
            git tag "v$NEW_VERSION"
            git push origin master --tags
          else
            echo "No changes to commit (version already up to date)"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: 🚀 Production Deployment
    needs: release-management
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Execute Live Migrations
        run: npm run migrate
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_PROJECT_ID: "roombox-f7bff" # Update with actual PROD ID
