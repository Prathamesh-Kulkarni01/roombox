name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Set up Java for Firebase Emulator
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Start Firebase Emulators
      run: |
        npx firebase emulators:start --only firestore,auth &
        sleep 15

    - name: Run Schema Migrations
      run: npm run migrate:local
      env:
        FIRESTORE_EMULATOR_HOST: "localhost:8080"
        FIREBASE_PROJECT_ID: "roombox-test"

    - name: Run Playwright E2E Tests
      run: npx playwright test auth-adaptive.spec.ts auth-security.spec.ts --project=setup --project=chromium
      env:
        CI: true
        FIRESTORE_EMULATOR_HOST: "localhost:8080"
        FIREBASE_AUTH_EMULATOR_HOST: "localhost:9099"
        FIREBASE_PROJECT_ID: "roombox-test"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

