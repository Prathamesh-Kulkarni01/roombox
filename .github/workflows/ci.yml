name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install

    - name: Set up Java for Firebase Emulator
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Start Firebase Emulator
      run: |
        pnpm exec firebase emulators:start --only firestore &
        # Wait for emulator to start
        sleep 15

    - name: Run Schema Migrations
      run: pnpm run migrate
      env:
        FIRESTORE_EMULATOR_HOST: "localhost:8080"
        FIREBASE_PROJECT_ID: "roombox-test"

    - name: Run E2E System Integrity Check
      run: pnpm run verify-logic
      env:
        FIRESTORE_EMULATOR_HOST: "localhost:8080"
        FIREBASE_PROJECT_ID: "roombox-test"

    - name: Run Automated Audits
      run: pnpm run audit
      env:
        FIRESTORE_EMULATOR_HOST: "localhost:8080"
        FIREBASE_PROJECT_ID: "roombox-test"
